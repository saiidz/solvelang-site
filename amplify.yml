version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - printenv | grep '^NEXT_PUBLIC_SITE_URL=' >> .env.production || true
        - printenv | grep '^STRIPE_PRICE_PRO_MONTHLY=' >> .env.production || true
        - printenv | grep '^STRIPE_PRICE_API_STARTER_MONTHLY=' >> .env.production || true
        - printenv | grep '^STRIPE_PRICE_API_GROWTH_MONTHLY=' >> .env.production || true
        - printenv | grep '^STRIPE_PRICE_CUSTOM_SETUP=' >> .env.production || true
        - printenv | grep '^STRIPE_SECRET_KEY=' >> .env.production || true
        - echo "---- .env.production keys ----"
        - cut -d '=' -f 1 .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
